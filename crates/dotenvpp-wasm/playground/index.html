<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DotenvPP WASM Playground</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #171717;
        --muted: #5b616e;
        --line: #d8dee8;
        --paper: #f8fafc;
        --accent: #0f766e;
        --accent-strong: #134e4a;
        --warn: #a16207;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: grid;
        gap: 8px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        min-width: 0;
        font-weight: 700;
      }

      textarea,
      pre {
        width: 100%;
        min-height: 280px;
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        font:
          0.95rem/1.45 "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      }

      textarea {
        resize: vertical;
        padding: 12px;
      }

      pre {
        overflow: auto;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin: 16px 0;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 42px;
        padding: 0 16px;
      }

      button:hover {
        background: var(--accent-strong);
      }

      .status {
        color: var(--muted);
        font-weight: 700;
      }

      .status.ok {
        color: var(--accent-strong);
      }

      .status.warn {
        color: var(--warn);
      }

      .status.error {
        color: var(--danger);
      }

      @media (max-width: 920px) {
        .grid {
          grid-template-columns: 1fr;
        }

        textarea,
        pre {
          min-height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>DotenvPP WASM Playground</h1>
        <p>Parse, validate, and lint environment files in the browser.</p>
      </header>

      <section class="grid" aria-label="Configuration inputs">
        <label>
          .env
          <textarea id="env">ENV=production
PORT=8080
LOG_LEVEL=info
DATABASE_URL=postgres://db/app?sslmode=require
</textarea>
        </label>

        <label>
          .env.schema
          <textarea id="schema">[vars.ENV]
type = "enum"
values = ["development", "staging", "production"]
required = true

[vars.PORT]
type = "port"
required = true

[vars.LOG_LEVEL]
type = "enum"
values = ["trace", "debug", "info", "warn", "error"]
default = "info"
</textarea>
        </label>

        <label>
          .env.policy
          <textarea id="policy">[[rules]]
name = "no-debug-in-prod"
description = "Debug logging is forbidden in production"
condition = "ENV == 'production' && LOG_LEVEL == 'debug'"
severity = "error"
</textarea>
        </label>
      </section>

      <section class="actions" aria-label="Actions">
        <button id="run" type="button">Run Checks</button>
        <span id="status" class="status">Ready</span>
      </section>

      <section aria-label="Result">
        <pre id="output"></pre>
      </section>
    </main>

    <script type="module">
      import init, {
        checkPolicy,
        parse,
        validate,
        version,
      } from "../pkg-web/dotenvpp_wasm.js";

      const envInput = document.querySelector("#env");
      const schemaInput = document.querySelector("#schema");
      const policyInput = document.querySelector("#policy");
      const output = document.querySelector("#output");
      const status = document.querySelector("#status");
      const run = document.querySelector("#run");

      await init();

      run.addEventListener("click", () => {
        try {
          const parsed = JSON.parse(parse(envInput.value));
          const validation = JSON.parse(validate(envInput.value, schemaInput.value));
          const policy = JSON.parse(checkPolicy(envInput.value, policyInput.value));
          const hasSchemaErrors = validation.diagnostics.some(
            (diagnostic) => diagnostic.severity === "error",
          );
          const hasPolicyErrors = policy.violations.some(
            (violation) => violation.severity === "error",
          );
          status.className = `status ${
            hasSchemaErrors || hasPolicyErrors ? "error" : "ok"
          }`;
          status.textContent =
            hasSchemaErrors || hasPolicyErrors ? "Issues found" : "Checks passed";
          output.textContent = JSON.stringify(
            {
              version: version(),
              parsed,
              validation,
              policy,
            },
            null,
            2,
          );
        } catch (error) {
          status.className = "status error";
          status.textContent = "Check failed";
          output.textContent = error instanceof Error ? error.message : String(error);
        }
      });

      run.click();
    </script>
  </body>
</html>
