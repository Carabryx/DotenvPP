name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run all tests
        run: |
          set -euo pipefail
          cargo test --all-features --all-targets --workspace --verbose
          cargo clippy --workspace --all-features --all-targets -- -D warnings
          cargo fmt -- --check

      - name: Build documentation
        run: cargo doc --all-features --no-deps

      - name: Security audit
        run: |
          set -euo pipefail
          cargo install cargo-audit
          cargo audit

      - name: Resolve release version
        id: release_meta
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          echo "Cargo.toml version: $PACKAGE_VERSION"
          echo "Git tag version: $TAG_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "⚠️ Tag v$TAG_VERSION does not match Cargo.toml workspace version $PACKAGE_VERSION"
            echo "⚠️ Using Cargo.toml version as the authoritative version"
          fi

          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare README for publish
        id: prepare_readme
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_meta.outputs.version }}"
          echo "Ensuring README dependency snippets match version $VERSION"

          sed -i "s/^\([[:space:]]*\)dotenvpp = \".*\"/\1dotenvpp = \"$VERSION\"/" README.md

          if git diff --quiet README.md; then
            echo "README already matches version $VERSION"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "README updated in working tree before publish"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff -- README.md
          fi

      # Publish workspace crates in dependency order
      - name: Publish dotenvpp-parser to crates.io
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p dotenvpp-parser --all-features

      - name: Publish dotenvpp to crates.io
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          echo "Waiting for crates.io index to update..."
          sleep 30
          cargo publish -p dotenvpp --all-features

      - name: Publish dotenvpp-cli to crates.io
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          echo "Waiting for crates.io index to update..."
          sleep 30
          cargo publish -p dotenvpp-cli --all-features

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Cargo.toml
            README.md
            LICENSE-MIT
            LICENSE-APACHE

      - name: Persist README version on main
        id: sync_readme_main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_meta.outputs.version }}"

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Discard pre-publish README edit before switching branches
          git checkout -- README.md

          git checkout main
          git pull origin main --rebase

          sed -i "s/^\([[:space:]]*\)dotenvpp = \".*\"/\1dotenvpp = \"$VERSION\"/" README.md

          if git diff --quiet README.md; then
            echo "README already up to date on main"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
          else
            git commit -am "docs: update readme version to $VERSION [skip ci]"
            git push origin main

            COMMIT_SHA=$(git rev-parse HEAD)
            echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
            echo "Pushed README update to main ($COMMIT_SHA)"
          fi

      - name: Sync README update to dev
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.sync_readme_main.outputs.commit_sha != ''
        run: |
          set -euo pipefail
          COMMIT_SHA="${{ steps.sync_readme_main.outputs.commit_sha }}"
          echo "Syncing README commit $COMMIT_SHA to dev..."

          git checkout dev
          git pull origin dev --rebase

          # Check if commit is already on dev
          if git merge-base --is-ancestor "$COMMIT_SHA" HEAD; then
            echo "ℹ️ SKIPPED: Commit $COMMIT_SHA is already on dev branch"
            exit 0
          fi

          # Attempt cherry-pick
          echo "🍒 Cherry-picking commit $COMMIT_SHA..."
          if git cherry-pick "$COMMIT_SHA" 2>&1; then
            git push origin dev
            echo "✅ SUCCESS: Cherry-picked and pushed README update to dev"
          else
            PICK_EXIT=$?
            # Check if cherry-pick produced an empty commit
            if git diff --cached --quiet 2>/dev/null; then
              echo "ℹ️ Cherry-pick is empty — change already present on dev"
              git cherry-pick --abort 2>/dev/null || true
              exit 0
            fi

            # Real conflict
            echo "⚠️ Cherry-pick failed with exit code $PICK_EXIT"
            git cherry-pick --abort 2>/dev/null || true
            git reset --hard HEAD

            echo "❌ CONFLICT: Could not cherry-pick README update to Dev"
            echo "   Manual resolution required:"
            echo "     git checkout Dev"
            echo "     git cherry-pick $COMMIT_SHA"
            echo "     # resolve conflicts"
            echo "     git push origin Dev"
            exit 1
          fi
